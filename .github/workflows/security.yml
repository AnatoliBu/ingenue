name: security

# SAST on every push to main and every PR. semgrep is the blocking gate (it understands
# both the inline JS in index.html and server.py); CodeQL adds deeper dataflow analysis for
# the Python and reports to the repo's Security tab.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # CodeQL SARIF upload

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: semgrep (SAST gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install semgrep
      # p/default is the curated security ruleset; --metrics=off keeps all telemetry off the
      # wire (--config=auto would require metrics). --error fails the job on any finding and
      # the inline `nosemgrep:` rationale comments are honored.
      - run: semgrep scan --config=p/default --error --metrics=off web/

  codeql:
    name: codeql (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        with:
          category: codeql-python
