<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ingenue transport diagnostics</title>
<style>
:root{color-scheme:dark;--bg:#1d1f21;--panel:#25282c;--fg:#c5c8c6;--muted:#969896;--accent:#deb887;--trim:#3a3d40}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:14px system-ui,sans-serif}.wrap{max-width:900px;margin:auto;padding:24px}.card{background:var(--panel);border:1px solid var(--trim);border-radius:12px;padding:18px;margin:14px 0}h1{font-size:24px;margin:0 0 8px}p{color:var(--muted);line-height:1.5}label{display:inline-flex;flex-direction:column;gap:6px;margin:0 12px 12px 0}input,button{font:inherit;border:1px solid var(--trim);border-radius:8px;padding:9px 11px;background:var(--bg);color:var(--fg)}button{cursor:pointer}button.primary{background:var(--accent);color:#241a0d;font-weight:700}button:disabled{opacity:.5}table{width:100%;border-collapse:collapse;margin-top:12px}th,td{text-align:right;padding:9px;border-bottom:1px solid var(--trim)}th:first-child,td:first-child{text-align:left}pre{white-space:pre-wrap;overflow:auto;max-height:45vh;background:var(--bg);padding:12px;border-radius:8px}.status{color:var(--accent);min-height:1.5em}
</style></head><body><main class="wrap"><h1>transport diagnostics</h1><p>Runs directly on the norns-served Ingenue page. It measures browser ↔ Python HTTP latency and browser ↔ matron WebSocket connection time. It does not claim audio or Lua-application latency.</p>
<section class="card"><label>samples<input id="samples" type="number" min="10" max="1000" value="100"></label><label>concurrency<input id="concurrency" type="number" min="1" max="32" value="8"></label><div><button id="run" class="primary">run diagnostics</button> <button id="copy" disabled>copy JSON</button></div><p id="status" class="status">ready</p></section>
<section id="results" class="card"></section><section class="card"><h2>raw report</h2><pre id="raw">Run the benchmark, then paste the JSON into issue #2.</pre></section></main>
<script type="module">import{mountDiagnostics}from'./transport-diagnostics.js';mountDiagnostics();</script></body></html>
