<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#090a0c"><title>Ingenue MIDI Learn</title><link rel="stylesheet" href="./midi.css"></head>
<body><main class="midi-page">
<header><div><div class="brand">Ingenue MIDI Learn</div><div class="muted">browser controller → Lua-applied norns parameters</div></div><nav><span class="pill" id="midi-status">connecting</span><span class="pill" id="midi-script">no active script</span><a class="pill" href="./performance.html">performance</a><a class="pill" href="./realtime-inspector.html">inspector</a></nav></header>
<section class="panel"><div class="panel-head"><h2>MIDI access</h2><button id="midi-permission">Grant MIDI permission</button></div><p id="midi-notice" class="notice"></p><div class="ports"><label>Input<select id="midi-input"><option value="">select MIDI input</option></select></label><div><strong>Outputs</strong><div id="midi-outputs" class="muted">permission not granted</div></div></div><div class="monitor">Last message: <code id="midi-monitor">—</code></div></section>
<section class="panel"><div class="panel-head"><h2>Learn mapping</h2><button id="midi-learn" disabled>Learn next MIDI message</button></div><div class="form-grid"><label>Target<select id="midi-target-kind"><option value="param">Parameter</option><option value="key">Norns key</option><option value="encoder">Norns encoder</option></select></label><label>Parameter ID / number<input id="midi-target-value" value="cutoff"></label><label>Mode<select id="midi-mode"><option value="absolute">Absolute</option><option value="relative-twos">Relative two's complement</option><option value="relative-offset">Relative offset 64</option><option value="relative-sign">Relative sign/magnitude</option></select></label><label class="check"><input id="midi-pickup" type="checkbox" checked> Soft takeover / pickup</label></div></section>
<section class="panel"><div class="panel-head"><h2>Exact script + device profile</h2><span class="muted">stored locally in this browser</span></div><div id="midi-mappings"></div></section>
</main><script type="module">import{mountMidiSurface}from'./midi-surface.js';mountMidiSurface();</script></body></html>
