<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ingenue realtime inspector</title><link rel="stylesheet" href="./shared-nav.css"><style>
:root{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color-scheme:dark;background:#111;color:#eee;--line:#333;--accent:#d9ff5b}body{max-width:1000px;margin:auto;padding:24px}.bar,.controls,.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.bar{justify-content:space-between;border-bottom:1px solid #333;padding-bottom:14px}.panel{border:1px solid #333;border-radius:12px;padding:16px;margin-top:16px;background:#171717}button,input{font:inherit;padding:10px 12px;border:1px solid #444;border-radius:8px;background:#222;color:#eee}button:active{transform:translateY(1px);background:#333}.key{min-width:76px;min-height:54px}.enc{min-width:54px}pre{white-space:pre-wrap;word-break:break-word;max-height:360px;overflow:auto}.muted{color:#999;font-size:12px}.status{padding:4px 8px;border:1px solid #555;border-radius:999px}</style></head><body>
<div class="bar"><div><strong>Ingenue realtime inspector</strong><div class="muted" id="endpoint"></div></div><nav class="row" data-ingenue-nav="inspector" aria-label="Ingenue pages"><span class="status" id="status">connecting</span><span>rev <b id="revision">—</b></span><button id="reconnect">reconnect</button></nav></div>
<div class="panel"><h3>Hardware controls</h3><div class="controls"><button class="enc" data-enc="1" data-delta="-1">E1 −</button><button class="enc" data-enc="1" data-delta="1">E1 +</button><button class="enc" data-enc="2" data-delta="-1">E2 −</button><button class="enc" data-enc="2" data-delta="1">E2 +</button><button class="enc" data-enc="3" data-delta="-1">E3 −</button><button class="enc" data-enc="3" data-delta="1">E3 +</button></div><div class="controls" style="margin-top:12px"><button class="key" data-key="1">K1</button><button class="key" data-key="2">K2</button><button class="key" data-key="3">K3</button></div></div>
<div class="panel"><h3>Parameter</h3><form id="param-form" class="row"><input id="param-id" value="cutoff" required pattern="[A-Za-z0-9_.:\-]+" maxlength="128" spellcheck="false"><input id="param-value" type="number" value="0.5" step="0.01" required><button>set</button><button type="button" id="ping">ping</button></form></div>
<div class="panel"><h3>Authoritative state</h3><pre id="state">null</pre></div><div class="panel"><h3>Session log</h3><pre id="log"></pre></div>
<script type="module">import {mountSharedNavigation} from './shared-nav.js'; import {mountInspector} from './realtime-inspector.js'; mountSharedNavigation(); mountInspector();</script></body></html>
