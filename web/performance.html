<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Ingenue · performance</title>
<style>
:root{color-scheme:dark;font-family:Inter,ui-sans-serif,system-ui,sans-serif;background:#090a0b;color:#f3f3f0;--line:#292c2f;--panel:#121416;--soft:#8d9499;--accent:#d5ff45}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -20%,#252a2c 0,#090a0b 45%);padding:clamp(14px,3vw,34px)}button{font:inherit;color:inherit}.shell{max-width:1180px;margin:auto}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:18px}.brand{font-size:clamp(24px,4vw,44px);font-weight:800;letter-spacing:-.05em}.eyebrow,.meta{font:600 11px ui-monospace,SFMono-Regular,monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--soft)}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.ghost{border:1px solid var(--line);background:#121416;border-radius:999px;padding:9px 13px}.layout{display:grid;grid-template-columns:minmax(0,1.7fr) minmax(280px,.7fr);gap:16px}.panel{background:color-mix(in srgb,var(--panel) 92%,transparent);border:1px solid var(--line);border-radius:22px;padding:clamp(14px,2.2vw,24px);box-shadow:0 22px 70px #0008}.panel-head{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:16px}.status{font:600 12px ui-monospace,SFMono-Regular,monospace;color:var(--soft)}#adapter-status[data-online="true"]{color:var(--accent)}.grid-wrap{overflow:auto;padding-bottom:4px}.grid{--cols:16;display:grid;grid-template-columns:repeat(var(--cols),minmax(24px,1fr));gap:clamp(4px,.65vw,8px);min-width:620px;touch-action:none}.grid-key{aspect-ratio:1;border:1px solid #303437;border-radius:clamp(5px,.7vw,9px);background:color-mix(in srgb,var(--accent) var(--level-pct,0%),#17191b);box-shadow:inset 0 0 var(--glow,0px) color-mix(in srgb,var(--accent) 60%,transparent);padding:0}.grid-key:active{transform:scale(.92)}.hardware{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.encoder{aspect-ratio:1;border:1px solid #34383b;border-radius:50%;background:radial-gradient(circle at 42% 35%,#363b3e,#17191b 58%,#090a0b);display:grid;place-items:center;touch-action:none;user-select:none;box-shadow:inset 0 0 0 8px #0d0f10,0 10px 24px #0008}.encoder::before{content:"";width:4px;height:28%;border-radius:4px;background:var(--accent);transform:translateY(-90%)}.encoder.active{outline:2px solid var(--accent)}.encoder-label{text-align:center;margin-top:8px;color:var(--soft);font:600 11px ui-monospace,monospace}.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}.norns-key{min-height:72px;border:1px solid #373b3e;border-radius:16px;background:#191c1e;font-weight:750}.norns-key:active{background:var(--accent);color:#10130a}.readout{margin-top:18px;border-top:1px solid var(--line);padding-top:16px}.value{font:12px ui-monospace,SFMono-Regular,monospace;color:#cdd2d4;word-break:break-all}.log{white-space:pre-wrap;max-height:140px;overflow:auto;color:var(--soft);font:11px ui-monospace,SFMono-Regular,monospace;margin:0}@media(max-width:850px){.layout{grid-template-columns:1fr}.top{align-items:flex-end}.hardware{max-width:520px}.panel.side{order:-1}}@media(max-width:520px){body{padding:10px}.panel{border-radius:17px}.top{display:block}.actions{justify-content:flex-start;margin-top:12px}.norns-key{min-height:58px}}
</style></head><body><main class="shell">
<header class="top"><div><div class="eyebrow">browser instrument surface</div><div class="brand">ingenue / live</div></div><div class="actions"><button class="ghost" id="open-inspector">inspector</button><button class="ghost" id="reconnect">reconnect</button></div></header>
<section class="layout"><article class="panel"><div class="panel-head"><div><div class="eyebrow">virtual monome</div><strong>Grid 1</strong></div><div class="status">rev <span id="revision">—</span></div></div><div class="grid-wrap"><div class="grid" id="virtual-grid"></div></div></article>
<aside class="panel side"><div class="panel-head"><div><div class="eyebrow">device</div><strong id="live-status">connecting</strong></div></div><div class="status" id="adapter-status">Waiting for adapter</div><div class="hardware" style="margin-top:22px"><div><div class="encoder" data-encoder="1"></div><div class="encoder-label">E1</div></div><div><div class="encoder" data-encoder="2"></div><div class="encoder-label">E2</div></div><div><div class="encoder" data-encoder="3"></div><div class="encoder-label">E3</div></div></div><div class="keys"><button class="norns-key" data-key="1">K1</button><button class="norns-key" data-key="2">K2</button><button class="norns-key" data-key="3">K3</button></div><div class="readout"><div class="eyebrow">last applied</div><div class="value" id="last-control">—</div></div><div class="readout"><div class="eyebrow">session</div><pre class="log" id="command-log"></pre></div></aside></section>
</main><script type="module">import{mountPerformance}from'./performance.js';mountPerformance();</script></body></html>
