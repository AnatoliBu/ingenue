<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#090a0c">
  <title>Ingenue performance</title>
  <link rel="stylesheet" href="./performance.css">
</head>
<body>
  <main class="surface">
    <header class="topbar">
      <div>
        <div class="brand">Ingenue performance</div>
        <div class="endpoint" id="surface-endpoint"></div>
      </div>
      <div class="session">
        <span class="pill" id="surface-status">connecting</span>
        <span class="pill">rev <b id="surface-revision">—</b></span>
        <span class="pill" id="surface-script">no active script</span>
        <a class="pill" href="./launchpad.html">Launchpad</a>
        <a class="pill" href="./midi.html">MIDI Learn</a>
        <a class="pill" href="./realtime-inspector.html">inspector</a>
      </div>
    </header>

    <div class="layout">
      <div class="primary">
        <section class="panel">
          <div class="panel-head">
            <h2>Grid</h2>
            <select id="grid-port" data-performance-control aria-label="Grid display port"></select>
          </div>
          <div class="controller-config" aria-label="Virtual Grid configuration">
            <label><span>vport</span><select id="grid-config-port" data-performance-control>
              <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option>
            </select></label>
            <label><span>shape</span><select id="grid-shape" data-performance-control>
              <option value="8x8">8×8</option><option value="16x8" selected>16×8</option><option value="16x16">16×16</option>
            </select></label>
            <label><span>rotation</span><select id="grid-rotation" data-performance-control>
              <option value="0">0°</option><option value="1">90°</option><option value="2">180°</option><option value="3">270°</option>
            </select></label>
            <button id="grid-apply" data-performance-control type="button">apply</button>
          </div>
          <div class="grid-shell"><div class="grid" id="grid" data-performance-control aria-label="Virtual Grid"></div></div>
          <p class="notice" id="surface-notice">Waiting for authoritative state…</p>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Arc</h2>
            <div class="device-options">
              <select id="arc-port" data-performance-control aria-label="Arc port"></select>
              <select id="arc-layout" data-performance-control aria-label="Arc layout">
                <option value="4">4 rings</option>
                <option value="2">2 rings</option>
              </select>
            </div>
          </div>
          <div class="arc-deck" id="arc" aria-label="Virtual Arc"></div>
          <p class="notice" id="arc-notice">Waiting for authoritative state…</p>
        </section>
      </div>

      <aside class="side">
        <section class="panel">
          <div class="panel-head"><h2>Keys</h2><span class="muted">hold</span></div>
          <div class="keys">
            <button class="hardware-key" data-performance-control data-key="1">K1</button>
            <button class="hardware-key" data-performance-control data-key="2">K2</button>
            <button class="hardware-key" data-performance-control data-key="3">K3</button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><h2>Encoders</h2><span class="muted">drag / wheel</span></div>
          <div class="encoders">
            <div class="encoder" data-performance-control data-encoder="1" role="group" aria-label="Encoder 1">
              <div class="encoder-dial"></div><strong>E1</strong>
              <div class="encoder-actions"><button data-delta="-1">−</button><button data-delta="1">+</button></div>
            </div>
            <div class="encoder" data-performance-control data-encoder="2" role="group" aria-label="Encoder 2">
              <div class="encoder-dial"></div><strong>E2</strong>
              <div class="encoder-actions"><button data-delta="-1">−</button><button data-delta="1">+</button></div>
            </div>
            <div class="encoder" data-performance-control data-encoder="3" role="group" aria-label="Encoder 3">
              <div class="encoder-dial"></div><strong>E3</strong>
              <div class="encoder-actions"><button data-delta="-1">−</button><button data-delta="1">+</button></div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><h2>Parameter lane</h2><span class="muted">one applied command in flight</span></div>
          <div class="param-grid">
            <input class="wide" id="param-id" data-performance-control value="cutoff" pattern="[A-Za-z0-9_.:-]+" aria-label="Parameter id">
            <input id="param-min" data-performance-control type="number" value="0" step="any" aria-label="Minimum">
            <input id="param-max" data-performance-control type="number" value="1" step="any" aria-label="Maximum">
            <input class="wide" id="param-slider" data-performance-control type="range" min="0" max="1" value="0.5" step="0.01" aria-label="Parameter value">
            <input class="wide" id="param-number" data-performance-control type="number" value="0.5" step="0.01" aria-label="Parameter numeric value">
          </div>
        </section>
      </aside>
    </div>
  </main>
  <script type="module">import {mountPerformanceSurface} from './performance-surface.js'; import {mountGridHardening} from './grid-hardening-ui.js'; const session=mountPerformanceSurface(); mountGridHardening(session);</script>
</body>
</html>
